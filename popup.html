<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGT POMan</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body class="popup-surface">
    <div class="window-shell">
        <main class="window-body">
            <section class="field field-row">
                <label for="caseSelect">Trường hợp</label>
                <select id="caseSelect">
                    <option value="">Chọn trường hợp</option>
                    <option value="case1">Giao vận/đối tác lấy NCC giao khách</option>
                    <option value="case2">Giao vận/đối tác lấy NCC giao về kho SGT</option>
                    <option value="case3">NCC giao về kho SGT</option>
                    <option value="case4">NCC giao tại nhà khách hàng</option>
                </select>
            </section>

            <section class="field field-row" id="partnerRow">
                <label for="partnerInput">Đối tác giao hàng</label>
                <div class="input-stack">
                    <input type="text" id="partnerInput" list="partnerList" placeholder="G.Vận hoặc đối tác">
                    <datalist id="partnerList"></datalist>
                </div>
            </section>

            <section class="field field-row" id="supplierRow">
                <label for="supplierInput">Nhà cung cấp</label>
                <div class="input-stack">
                    <input type="text" id="supplierInput" list="supplierList" placeholder="Nhập tên hoặc mã nhà cung cấp">
                    <datalist id="supplierList"></datalist>
                </div>
            </section>

            <section class="field">
                <label>Kích hoạt/Tặng quà</label>
                <div id="productStatusList" class="product-status-list"></div>
                <div class="product-status-actions">
                    <button id="addProductStatus" class="mini-ghost-button" type="button">+ Thêm sản phẩm</button>
                </div>
                <datalist id="productCodeList"></datalist>
            </section>

            <section class="field field-row">
                <label for="shippingFee">Tiền cước (nếu có)</label>
                <div class="currency-input">
                    <input type="text" id="shippingFee" placeholder="0" inputmode="numeric">
                    <span class="suffix">đ</span>
                </div>
            </section>

            <section class="field">
                <label for="note">Ghi chú thêm</label>
                <textarea id="note" placeholder="Ví dụ: mang loa về kho"></textarea>
            </section>

            <section class="field">
                <label>Dữ liệu gợi ý</label>
                <div class="button-stack">
                    <div class="button-row">
                        <button id="openSheet" class="ghost-button" type="button">Mở Google Sheet</button>
                        <button id="refreshPartners" class="ghost-button" type="button">Tải dữ liệu mới</button>
                    </div>
                    <span id="dataStatus" class="status-text">Chưa tải dữ liệu</span>
                </div>
            </section>

            <div class="button-stack form-actions">
                <button id="resetButton" class="secondary-button" type="button">Xoá các thông tin đã điền</button>
                <button id="copyButton" class="primary-button" type="button">Sao chép</button>
            </div>
        </main>

        <section class="restore-panel">
            <div class="restore-header">
                <label for="restoreInput">Điền lại dữ liệu cũ</label>
                <span class="status-text">Paste note cũ rồi bấm xử lý để tự điền lại form.</span>
            </div>
            <textarea id="restoreInput" class="restore-textarea" placeholder="Ví dụ:
NCC giao về kho | Việt Hàn
OLED65G5PSA - Còn Kích | 
OLED55C5PSA - Còn Kích | 
Cước: 20.000đ | Đã trừ chiết khấu."></textarea>
            <div class="restore-actions">
                <button id="restoreButton" class="secondary-button" type="button">Nhập lại các thông tin đã điền</button>
            </div>
            <span id="restoreStatus" class="status-text"></span>
        </section>
    </div>

    <script src="popup.js"></script>
</body>
</html>
